<div class="card">

<h2>Contact Us</h2>

<form action="http://foo.com" method="get">

<label>Name *</label><br>
<input type="text" name="name" required><br><br>

<label>Email *</label><br>
<input type="email" name="email" required><br><br>

<label>Message *</label><br>

<input type="submit">

</form>

width="100%"
height="300"
style="border:0"
loading="lazy"
allowfullscreen

</iframe>

</div>
